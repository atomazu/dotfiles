general {
    ignore_dbus_inhibit = false                         # Whether to ignore dbus-sent idle-inhibit requests
    lock_cmd = ~/.config/hypr/Scripts/lock.sh           # Command to run for locking
    before_sleep_cmd = ~/.config/hypr/Scripts/lock.sh   # Command to run before sleep
    after_sleep_cmd = hyprctl dispatch dpms on          # Command to run after sleep
}

# Dim the screen after 5 minutes
listener {
    timeout = 300
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# Lock screen after 7 minutes
listener {
    timeout = 420
    on-timeout = ~/.config/hypr/Scripts/lock.sh
}

# Turn off screen after 10 minutes
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 30 minutes
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}