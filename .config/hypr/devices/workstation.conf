# Workstation-specific config

# Monitor setup
monitor = DP-1, 2560x1440@144, 0x0, 1, transform, 1
monitor = DP-3, 2560x1440@240, 1440x560, 1
monitor = DP-2, 2560x1440@75, 4000x560, 1

# Set primary display
exec-once = sleep 1 && xrandr --output DP-3 --primary

## NVIDIA specific settings
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = __GL_SYNC_ALLOWED,1
env = NVD_BACKEND,direct

# NVIDIA cursor fix
cursor {
    no_hardware_cursors = true
}

# Workspaces
# DP-1: Acer XV272U (Vertical, Left)
workspace = 1, monitor:DP-1, default:true, defaultName:web
workspace = 4, monitor:DP-1, defaultName:webbing
workspace = 7, monitor:DP-1, defaultName:webster

# DP-3: LG ULTRAGEAR+ (240Hz, Middle)
workspace = 2, monitor:DP-3, default:true, defaultName:main
workspace = 5, monitor:DP-3, defaultName:alt
workspace = 8, monitor:DP-3, defaultName:media
workspace = 10, monitor:DP-3, defaultName:games

# DP-2: Lenovo D32q-20B (Right)
workspace = 3, monitor:DP-2, default:true, defaultName:extra
workspace = 6, monitor:DP-2, defaultName:utils
workspace = 9, monitor:DP-2, defaultName:misc

# Default workspace assignments
windowrulev2 = workspace 1, class:^(zen-alpha)$
windowrulev2 = workspace 3, class:^(vesktop)$
windowrulev2 = workspace 3, class:^(spotify)$

# Game-specific rules
$GAMES = ^(steam_app_.*|osu!)$

windowrulev2 = monitor DP-3, class:$GAMES
windowrulev2 = workspace 10 silent, class:$GAMES
windowrulev2 = fullscreen, class:$GAMES
windowrulev2 = immediate, class:$GAMES
windowrulev2 = renderunfocused, class:$GAMES

input {
    sensitivity = -0.4

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
        disable_while_typing = true
    }
}

# Monitor-column traversal (±3 workspaces)
bind = SUPER CTRL, E, workspace, +3
bind = SUPER CTRL, Q, workspace, -3

bind = SUPER SHIFT, E, movetoworkspace, +3
bind = SUPER SHIFT, Q, movetoworkspace, -3