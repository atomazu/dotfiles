# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors

# HDMI-A-1: Acer XV272U (Vertical, Left)
monitor = HDMI-A-1, 2560x1440@144, 0x0, 1, transform, 1

# DP-3: LG ULTRAGEAR+ (240Hz, Middle)
monitor = DP-3, 2560x1440@240, 1440x560, 1

# DP-2: Lenovo D32q-20B (Right)
monitor = DP-2, 2560x1440@75, 4000x560, 1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = foot
$fileManager = nemo
$browser = firefox
$taskManager = bashtop

# Rofi scripts
$appLauncher = ~/.config/hypr/Scripts/app-launcher.sh
$appSwitcher = ~/.config/hypr/Scripts/window-switcher.sh
$everySearch = ~/.config/hypr/Scripts/everything-search.sh

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:
#exec-once = hyprpaper # Replaced by swww-daemon.

# Agents
exec-once = swww-daemon
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = systemctl --user start hyprpolkitagent

# Smoothly cycle through backgrounds in ~/Pictures/Backgrounds
exec-once = ~/.config/hypr/Scripts/wallpaper-cycle.sh ~/Pictures/Backgrounds

# Core functionallity
exec-once = hypridle
exec-once = waybar
exec-once = mako

# RGB Stuff
exec-once = openrgb --server --profile workspace-colors.orp

# Environment preperation
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment QT_QPA_PLATFORMTHEME
exec-once = sleep 1 && xrandr --output DP-3 --primary

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = GTK_THEME,Adwaita:dark
env = GTK2_RC_FILES,/usr/share/themes/Adwaita-dark/gtk-2.0/gtkrc
env = QT_STYLE_OVERRIDE,Adwaita-Dark

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    # Top gap is 0, because Waybar is 20px high.
    gaps_out = 0, 20, 20, 20

    border_size = 2
    
    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    drop_shadow = true
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 10
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[t1], gapsout:0, gapsin:0
# workspace = w[tg1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrulev2 = bordersize 0, floating:0, onworkspace:w[t1]
# windowrulev2 = rounding 0, floating:0, onworkspace:w[t1]
# windowrulev2 = bordersize 0, floating:0, onworkspace:w[tg1]
# windowrulev2 = rounding 0, floating:0, onworkspace:w[tg1]
# windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
# windowrulev2 = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    vrr = 2
    vfr = true
}

####################
### WINDOW RULES ###
####################

# Fix XWayland Behaviour
windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus, class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# Group Assignment
$HIGH_OPACITY_WINDOWS = ^(firefox)$
$MEDIUM_OPACITY_WINDOWS = ^(code-url-handler|nemo|vesktop|spotify)$
$LOW_OPACITY_WINDOWS = ^(org.pulseaudio.pavucontrol|Rofi)$
$FLOATING_CENTERED_APPS = ^(Rofi|org.pulseaudio.pavucontrol)$
$GAMES = ^(steam_app_.*|osu!)$

# Opacity rules
$HIGH_OPACITY_ACTIVE = 0.99
$HIGH_OPACITY_INACTIVE = 0.97

$MEDIUM_OPACITY_ACTIVE = 0.97
$MEDIUM_OPACITY_INACTIVE = 0.93

$LOW_OPACITY_ACTIVE = 0.93
$LOW_OPACITY_INACTIVE = 0.85

# Opacity Rules
windowrulev2 = opacity $HIGH_OPACITY_ACTIVE $HIGH_OPACITY_INACTIVE, class:$HIGH_OPACITY_WINDOWS
windowrulev2 = opacity $MEDIUM_OPACITY_ACTIVE $MEDIUM_OPACITY_INACTIVE, class:$MEDIUM_OPACITY_WINDOWS
windowrulev2 = opacity $LOW_OPACITY_ACTIVE $LOW_OPACITY_INACTIVE, class:$LOW_OPACITY_WINDOWS

# Floating Rules
windowrulev2 = float, class:$FLOATING_CENTERED_APPS
windowrulev2 = center, class:$FLOATING_CENTERED_APPS

# Rofi Rules
windowrulev2 = stayfocused, class:^(Rofi)$
windowrulev2 = dimaround, class:^(Rofi)$

# Pavucontrol Rules
windowrulev2 = minsize 1600 900, class:^(org.pulseaudio.pavucontrol)$

# Game Rules
windowrulev2 = monitor DP-3, class:$GAMES
windowrulev2 = workspace 10 silent, class:$GAMES
windowrulev2 = fullscreen, class:$GAMES
windowrulev2 = immediate, class:$GAMES
windowrulev2 = renderunfocused, class:$GAMES

# Default workspaces
windowrulev2 = workspace 1, class:^(firefox)$
windowrulev2 = workspace 3, class:^(vesktop)$
windowrulev2 = workspace 3, class:^(spotify)$

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = de
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = -0.5 # -1.0 - 1.0, 0 means no modification.
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.4
}

# For Nvidia compatibility
cursor {
    no_hardware_cursors = true
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords

# Core programs
bind = SUPER, RETURN, exec, $terminal
bind = SUPER, B,      exec, $browser
bind = SUPER, E,      exec, $fileManager
bind = SUPER, C,      exec, code
bind = SUPER, P,      exec, spotify-launcher
bind = SUPER, D,      exec, vesktop

# Rofi bindings
bind = SUPER, R,  exec, $appLauncher
bind = SUPER, tab, exec, $appSwitcher
bind = SUPER SHIFT, R, exec, $everySearch
bind = SUPER, L, exec, rofi -show power -modi "power:~/.config/hypr/Scripts/powermenu.sh" -theme ~/.config/rofi/powermenu.rasi

# Window controls
bind = SUPER, Q, killactive,
bind = SUPER, T, togglefloating,
bind = SUPER, F, fullscreen, 0
bind = SUPER SHIFT, F, fullscreen, 1

# Move windows with arrow keys
bind = SUPER SHIFT, left,  movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up,    movewindow, u
bind = SUPER SHIFT, down,  movewindow, d

# Move focus with arrow keys
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

# Resize windows with arrow keys
bind = SUPER ALT, left,  resizeactive, -20 0
bind = SUPER ALT, right, resizeactive, 20 0
bind = SUPER ALT, up,    resizeactive, 0 -20
bind = SUPER ALT, down,  resizeactive, 0 20

# Center floating window
bind = SUPER, C, centerwindow

# Scratchpad controls
bind = SUPER SHIFT, Y, movetoworkspace, special:magic    # Move to scratchpad
bind = SUPER, Y,       togglespecialworkspace, magic     # Toggle scratchpad

# Task manager controls
bind = SUPER, escape, togglespecialworkspace, taskmanager

## Media Controls

# Volume
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Media
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause

# Screen brightness
bindel = , XF86MonBrightnessUp,   exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Copy screen area to clipboard
bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot Area"
bind = , Print, exec, grim -g "$(slurp -s)" ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png

## Mouse Bindings

# Move/resize windows with mouse
bindm = SUPER, mouse:272, movewindow      # Left click
bindm = SUPER, mouse:273, resizewindow    # Right click

# Switch to workspace
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move window to workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Mouse wheel workspace switching
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Disabled:
# bind = SUPER, P, pseudo,
# bind = SUPER, J, togglesplit,

##################
### Workspaces ###
##################

# HDMI-A-1: Acer XV272U (Vertical, Left)
workspace = 1, monitor:HDMI-A-1, default:true, defaultName:web
workspace = 4, monitor:HDMI-A-1, defaultName:webbing
workspace = 7, monitor:HDMI-A-1, defaultName:webster

# DP-3: LG ULTRAGEAR+ (240Hz, Middle)
workspace = 2, monitor:DP-3, default:true, defaultName:main
workspace = 5, monitor:DP-3, defaultName:alt
workspace = 8, monitor:DP-3, defaultName:media

# DP-2: Lenovo D32q-20B (Right)
workspace = 3, monitor:DP-2, default:true, defaultName:extra
workspace = 6, monitor:DP-2, defaultName:utils
workspace = 9, monitor:DP-2, defaultName:misc

# Special workspaces
workspace = 10, monitor:DP-3, defaultName:games
workspace = special:scratchpad, on-created-empty:foot
workspace = special:taskmanager, on-created-empty:$terminal -e $taskManager

# Disabled: Smart gaps (uncomment if you want gaps only when more than one window)
# workspace = w[t1], gapsout:0, gapsin:0
# workspace = w[tg1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
